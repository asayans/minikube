apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-deployment
  namespace: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.69.0
        ports:
        - containerPort: 16686
        - containerPort: 14250
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: metrics
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: otlp-grpc
    port: 14250
    targetPort: 14250
