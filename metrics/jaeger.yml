apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-deployment
  namespace: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.69.0
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - name: ui
          containerPort: 16686
        - name: otlp-grpc
          containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: metrics
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
