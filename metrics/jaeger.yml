apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger-deployment
  namespace: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.69.0
        ports:
        - containerPort: 16686
        - containerPort: 14250
