apiVersion: v1
kind: Service
metadata:
  name: simple-flask-app
  namespace: app
spec:
  type: NodePort
  selector:
    app: simple-flask-app
  ports:
  - name: web
    port: 5000
    targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-flask-app-deployment
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-flask-app
  template:
    metadata:
      labels:
        app: simple-flask-app
    spec:
      containers:
      - name: simple-flask-app
        image: simple-flask-app:otel
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: OTEL_SERVICE_NAME
          value: simple-flask-app
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.metrics.svc.cluster.local:4317
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
